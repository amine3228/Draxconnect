<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brands | Draxlmaier</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  background:#05070c;
  color:white;
}

/* HERO */
header{
  padding:100px 20px 60px;
  text-align:center;
  background:radial-gradient(circle at top,#111a2e,#05070c);
}

header h1{
  font-size:3rem;
  font-weight:600;
  letter-spacing:-1px;
}

header p{
  margin-top:15px;
  color:#aaa;
  max-width:700px;
  margin-left:auto;
  margin-right:auto;
}

/* BUTTON */
.dashboard-btn{
  margin-top:30px;
  padding:14px 28px;
  border:none;
  border-radius:30px;
  background:linear-gradient(135deg,#4f8cff,#6a5cff);
  color:white;
  cursor:pointer;
  font-weight:500;
  transition:0.3s;
}

.dashboard-btn:hover{
  transform:translateY(-3px);
  box-shadow:0 10px 30px rgba(79,140,255,0.3);
}

/* GRID */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:30px;
  max-width:1100px;
  margin:80px auto;
  padding:0 20px;
}

/* CARD PREMIUM */
.card{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:20px;
  padding:30px;
  text-align:center;
  cursor:pointer;

  transition:0.4s;
  backdrop-filter:blur(12px);

  position:relative;
  overflow:hidden;
}

/* glow effect */
.card::before{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background:radial-gradient(circle,rgba(79,140,255,0.15),transparent);
  top:-50%;
  left:-50%;
  opacity:0;
  transition:0.4s;
}

.card:hover::before{
  opacity:1;
}

/* LOGO */
.logo-circle{
  width:120px;
  height:120px;
  margin:auto;
  border-radius:50%;
  background:rgba(255,255,255,0.08);
  display:flex;
  align-items:center;
  justify-content:center;
  transition:0.4s;
}

.logo-circle img{
  width:70px;
  transition:0.4s;
}

/* TEXT */
.card h3{
  margin-top:20px;
  font-size:1.2rem;
  font-weight:500;
  color:#ddd;
}

/* HOVER */
.card:hover{
  transform:translateY(-10px) scale(1.03);
  border-color:rgba(79,140,255,0.4);
}

.card:hover .logo-circle{
  transform:scale(1.1);
  background:rgba(79,140,255,0.2);
}

/* BACK BUTTON */
.back-btn{
  display:block;
  text-align:center;
  margin:60px auto;
  color:#aaa;
  text-decoration:none;
  transition:0.3s;
}

.back-btn:hover{
  color:white;
}
/* TOP NAVBAR */
.top-bar{
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: flex-start; /* 🔥 logo à gauche */
  padding: 0 30px;
  background: rgba(5,7,12,0.6);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  z-index: 1000;
}

/* LOGO */
.top-bar img{
  height: 42px;
  object-fit: contain;
  transition: 0.3s;
}

.top-bar img:hover{
  transform: scale(1.05);
}
</style>
</head>

<body>
<nav class="top-bar">
  <img src="images/logo drax.jpg" alt="Draxlmaier Logo">
</nav>
<header>
  <h1>Choisir une marque</h1>
  <p>Accédez aux services spécifiques de chaque constructeur automobile dans un environnement industriel intelligent.</p>

  <button class="dashboard-btn" onclick="goToDashboard()">
    📊 Dashboard Général
  </button>
</header>

<div class="container">

  <div class="card" onclick="goToService('mercedes')">
    <div class="logo-circle">
      <img src="images/mercedes.png">
    </div>
    <h3>Mercedes-Benz</h3>
  </div>

  <div class="card" onclick="goToService('bmw')">
    <div class="logo-circle">
      <img src="images/bmw.png">
    </div>
    <h3>BMW</h3>
  </div>

  <div class="card" onclick="goToService('volkswagen')">
    <div class="logo-circle">
      <img src="images/vw.png">
    </div>
    <h3>Volkswagen</h3>
  </div>

  <div class="card" onclick="goToService('skoda')">
    <div class="logo-circle">
      <img src="images/skoda.png">
    </div>
    <h3>Škoda</h3>
  </div>

</div>

<a href="index.html" class="back-btn">← Retour à l'accueil</a>

<script>
function goToService(brand){
  window.location.href = "services.html?brand=" + brand;
}

function goToDashboard(){
  window.location.href = "dashboard.html";
}
</script>

</body>
</html>
