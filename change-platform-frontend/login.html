<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - La Fiesta</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body {
    font-family:'Inter',sans-serif;
    margin:0;
    background:#f0f2f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.login-container {
    background:white;
    padding:40px 30px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    width:350px;
}
.login-container h2 {
    text-align:center;
    margin-bottom:30px;
    color:#0d1b2a;
}
.login-container input, .login-container select {
    width:100%;
    padding:12px;
    margin-bottom:20px;
    border-radius:8px;
    border:1px solid #ccc;
}
.login-container button {
    width:100%;
    padding:12px;
    border:none;
    background:#0d1b2a;
    color:white;
    font-weight:600;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}
.login-container button:hover {
    background:#1c1c1e;
}
</style>
</head>
<body>

<div class="login-container">
    <h2>Connexion</h2>
    <form id="loginForm">
        <input type="text" id="username" placeholder="Nom d'utilisateur" required>
        <input type="password" id="password" placeholder="Mot de passe" required>
        <select id="service" required>
            <option value="">-- Sélectionnez le service --</option>
            <option value="technique.html">Technique</option>
            <option value="quali.html">Qualité</option>
            <option value="tpm.html">TPM</option>
            <option value="logist.html">Logistique</option>
        </select>
        <button type="submit">Se connecter</button>
    </form>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', function(e){
    e.preventDefault();
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;
    const service = document.getElementById('service').value;

    // Vérification simple (à remplacer par une vraie authentification)
    if(user && pass && service){
        // redirection selon le service choisi
        window.location.href = service;
    } else {
        alert("Veuillez remplir tous les champs !");
    }
});
</script>

</body>
</html>
