<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Détail Service</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Inter',sans-serif;
    background:#0d1b2a;
    color:white;
    text-align:center;
    padding:50px;
}
h1{font-size:2.5rem;}
p{margin-top:20px;color:#ccc;}
button{
    margin-top:30px;
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:#ff2d55;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<h1 id="title"></h1>
<p id="desc"></p>

<button onclick="goBack()">⬅ Retour</button>

<script>
const params = new URLSearchParams(window.location.search);
const brand = params.get("brand");
const service = params.get("service");

// données
const data = {
  qualite: "Gestion qualité et conformité.",
  logistique: "Gestion des flux et des stocks.",
  tpm: "Maintenance et performance machines.",
  technique: "Amélioration continue et ingénierie."
};

document.getElementById("title").innerText =
  service.toUpperCase() + " - " + brand.toUpperCase();

document.getElementById("desc").innerText = data[service];

function goBack(){
    window.history.back();
}
</script>

</body>
</html>
